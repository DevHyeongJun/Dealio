server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /dealio/;
    }

    # API 프록시 — '^~' 로 정규식 location 보다 우선 매칭
    location ^~ /dealio/api/ {
        proxy_pass http://backend:4000/dealio/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 프론트 SPA — '^~' 로 아래 정규식 location 이 가로채지 못하게 한다.
    # vite build 의 base=/dealio/ 결과물을 / 로 rewrite 해서 dist 루트에서 서빙.
    location ^~ /dealio/ {
        rewrite ^/dealio/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # 캐시 헤더 (혹시 직접 / 경로로 들어오는 자산용)
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
